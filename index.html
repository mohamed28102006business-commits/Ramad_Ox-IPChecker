<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>IP & DNS & WebRTC Checker</title>
  <style>
    body { font-family: Tahoma; direction: rtl; background: #f9f9f9; padding: 20px; }
    h1 { color: #333; }
    .box { background: #fff; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 0 5px #ccc; }
  </style>
</head>
<body>
  <h1>مرحباً بك في موقع فحص الـ IP و الـ DNS و WebRTC</h1>
  <button onclick="getDetails()">اعرض التفاصيل</button>
  
  <div id="info" class="box"></div>
  <div id="dns" class="box"></div>
  <div id="webrtc" class="box"></div>

  <script>
    async function getDetails() {
      // جلب الـ IP والموقع من ipapi
      let response = await fetch("https://ipapi.co/json/");
      let data = await response.json();

      // بيانات المتصفح
      let browser = navigator.userAgent;
      let lang = navigator.language;
      let platform = navigator.platform;
      let timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

      document.getElementById("info").innerHTML = `
        <p><b>عنوان الـ IP:</b> ${data.ip}</p>
        <p><b>الموقع:</b> ${data.city}, ${data.country_name}</p>
        <p><b>مزود الخدمة (ISP):</b> ${data.org}</p>
        <p><b>المتصفح:</b> ${browser}</p>
        <p><b>النظام:</b> ${platform}</p>
        <p><b>اللغة:</b> ${lang}</p>
        <p><b>المنطقة الزمنية:</b> ${timezone}</p>
      `;

      // جلب معلومات DNS (اختبار مبسط)
      let dnsResponse = await fetch("https://dns.google/resolve?name=example.com&type=A");
      let dnsData = await dnsResponse.json();
      let servers = dnsData.Authority ? dnsData.Authority : dnsData.Answer;
      let dnsInfo = "<h3>خوادم DNS المستخدمة:</h3>";
      if (servers) {
        servers.forEach(s => {
          dnsInfo += `<p>${s.name} → ${s.data}</p>`;
        });
      } else {
        dnsInfo += "<p>لم يتم العثور على تفاصيل DNS</p>";
      }
      document.getElementById("dns").innerHTML = dnsInfo;

      // WebRTC Leak Test
      let rtc = new RTCPeerConnection({iceServers:[]});
      rtc.createDataChannel("");
      rtc.createOffer().then(offer => rtc.setLocalDescription(offer));
      rtc.onicecandidate = function(event) {
        if (event && event.candidate && event.candidate.candidate) {
          let candidate = event.candidate.candidate;
          let ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9:]+)\b/;
          let ipMatch = candidate.match(ipRegex);
          if (ipMatch) {
            document.getElementById("webrtc").innerHTML = `
              <h3>WebRTC Leak Test:</h3>
              <p><b>Local/Public IP:</b> ${ipMatch[1]}</p>
            `;
          }
        }
      };
    }
  </script>
</body>
</html>
